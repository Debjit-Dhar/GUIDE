MODEL:
  PRETRAIN_CHOICE: 'imagenet'
  METRIC_LOSS_TYPE: 'triplet'
  IF_LABELSMOOTH: 'on'
  IF_WITH_CENTER: 'no'
  NAME: 'ViT-B-16'
  STRIDE_SIZE: [16, 16]
  ID_LOSS_WEIGHT : 1.0
  TRIPLET_LOSS_WEIGHT : 1.0

INPUT:
  SIZE_TRAIN: [256, 128]
  SIZE_TEST: [256, 128]
  PROB: 0.5 # random horizontal flip
  RE_PROB: 0.5 # random erasing
  PADDING: 10
  PIXEL_MEAN: [0.5, 0.5, 0.5]
  PIXEL_STD: [0.5, 0.5, 0.5]

DATALOADER:
  SAMPLER: 'softmax_triplet'
  NUM_INSTANCE: 4
  NUM_WORKERS: 8

SOLVER:
  IMS_PER_BATCH: 64
  OPTIMIZER_NAME: "Adam"
  BASE_LR: 0.000005
  WARMUP_METHOD: 'linear'
  WARMUP_ITERS: 10
  WARMUP_FACTOR: 0.1
  WEIGHT_DECAY:  0.0001
  WEIGHT_DECAY_BIAS: 0.0001
  LARGE_FC_LR: False
  MAX_EPOCHS: 60
  CHECKPOINT_PERIOD: 60
  LOG_PERIOD: 50
  EVAL_PERIOD: 60
  BIAS_LR_FACTOR: 2
  STEPS: [30, 50]
  GAMMA: 0.1

TEST:
  EVAL: True
  IMS_PER_BATCH: 64
  RE_RANKING: False
  WEIGHT: ''

DICMA:
  ENABLED: True
  RETAIN_BASELINE: True
  ALPHA: 1.0
  BETA: 0.0
  GAMMA: 0.0
  LR: 0.001
  WEIGHT_DECAY: 0.0
  USE_OVERLAPPING_PATCHES: True
  NUM_PATCHES: 16
  PATCH_SIZE: 2
  PATCH_STRIDE: 1
  USE_SIDE_EMBEDDING: True
  USE_RERANK: True
  RERANK_K1: 20
  RERANK_K2: 6
  RERANK_LAMBDA: 0.3
  RANK: 64
  EPS: 1e-3
  EMA_MOMENTUM: 0.01
  FEAT_KEY: 1
  USE_GW: False

TEST:
  EVAL: True
  IMS_PER_BATCH: 64
  RE_RANKING: False
  WEIGHT: ''
  NECK_FEAT: 'before'
  FEAT_NORM: 'yes'

DATASETS:
   NAMES: ('market1501')
   ROOT_DIR: ('/kaggle/input/market-1501')
OUTPUT_DIR: '/kaggle/working'
